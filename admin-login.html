<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrador - PlayStation Store</title>
    <link rel="icon" href="https://cdn2.steamgriddb.com/logo_thumb/d2dd0c81db17acfecb071c0a32565677.png">
    <style>
        body { 
            background: #0f0f0f; 
            color: white; 
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
        }
        input {
            width: 100%;
            padding: 1rem;
            margin: 1rem 0;
            background: #333;
            border: 1px solid #555;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 1rem;
            background: #0070f3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Panel de Administración</h2>
        <input type="email" id="email" placeholder="Email de administrador" required>
        <input type="password" id="password" placeholder="Contraseña" required>
        <button onclick="loginAdmin()">Iniciar Sesión</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyA8pmCj75_X_3dY-687gb23kXmCr5nqKgo",
            authDomain: "playstation-store-b81cb.firebaseapp.com",
            projectId: "playstation-store-b81cb"
        });
        
        const adminEmails = ['admin@gmail.com', 'jlpt0801@gmail.com'];
        
        function loginAdmin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!adminEmails.includes(email)) {
                alert('No tienes permisos de administrador');
                return;
            }
            
            firebase.auth().signInWithEmailAndPassword(email, password)
                .then(() => {
                    window.location.href = 'admin.html';
                })
                .catch(error => {
                    alert('Error: ' + error.message);
                });
        }
    </script>
</body>
</html>
